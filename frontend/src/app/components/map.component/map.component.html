<div class="container">

  <!-- Botões de controle principais -->
  <div class="controls">
    <button
      class="manual"
      [class.active]="manualMode"
      (click)="toggleManualMode()">
      {{ manualMode ? 'Modo Manual Ativo' : 'Modo Manual' }}
    </button>
    <button class="primary" (click)="addRandomPoint()">+ Ponto Aleatório</button>
    <button class="primary" (click)="generate20RandomPoints()">+ 20 Pontos</button>
    <button class="primary" (click)="optimize()">Otimizar (NN)</button>
    <button class="primary" (click)="fifoRoute()">Rota FIFO</button>
    <button class="danger" (click)="clear()">Limpar Tudo</button>
  </div>

  <!-- Controle deslizante da velocidade da van -->
  <div class="speed-control">
    Velocidade da Van:
    <input
      type="range"
      min="0.5"
      max="5"
      step="0.1"
      value="1"
      (input)="changeSpeed($event)"
    />
  </div>

  <!-- Indicador de bateria -->
  <div class="battery">
    🔋 Bateria:
    <span [style.color]="remainingEnergy < 0 ? 'red' : '#00ffcc'">
      {{ remainingEnergy | number:'1.0-2' }} kWh
    </span>
  </div>

  <!-- Área do mapa (canvas) -->
  <div class="map-container" style="height: 600px;">
    <canvas
      #routeCanvas
      class="map-canvas"
      (click)="onCanvasClick($event)">
    </canvas>
  </div>

  <!-- Painel com informações detalhadas da rota -->
  <app-route-info
    [totalDistance]="totalDistance"
    [deliveriesCount]="points.length - 1"
    [completedDeliveries]="completedDeliveries"
    [totalDeliveries]="totalDeliveries"
    [currentSegment]="currentSegment"
    [totalSegments]="optimizedRoute.length - 1"
    [distanceToNext]="distanceToNext"
    [remainingDistance]="remainingDistance">
  </app-route-info>

  <!-- Dica para o modo manual -->
  <div class="hint" *ngIf="manualMode">
    Clique em qualquer lugar do mapa para adicionar pontos de entrega.
  </div>

</div>
